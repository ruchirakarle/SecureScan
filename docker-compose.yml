version: "3.9"

services:

  # ── Person 2: Node.js/Express API ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - AWS_REGION=us-east-1
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - DYNAMODB_TABLE=securescan-scans-dev
      - SNS_HIGH_SEVERITY_ARN=arn:aws:sns:us-east-1:509178112369:securescan-high-severity-dev
      - PENTEST_SERVICE_URL=http://pentest:3002
    depends_on:
      - dynamodb-local
    restart: unless-stopped

  # ── Person 3: Pentest scanner ────────────────────────────────
  pentest:
    build:
      context: ./pentest/backend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    restart: unless-stopped

  # ── DynamoDB Local ───────────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    restart: unless-stopped

  # ── DynamoDB table setup (runs once) ────────────────────────
  dynamodb-setup:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
        sleep 3 &&
        aws dynamodb create-table
          --table-name securescan-scans-dev
          --attribute-definitions
            AttributeName=scanId,AttributeType=S
            AttributeName=scanType,AttributeType=S
            AttributeName=severity,AttributeType=S
          --key-schema
            AttributeName=scanId,KeyType=HASH
          --global-secondary-indexes
            '[{\"IndexName\":\"scanType-index\",\"KeySchema\":[{\"AttributeName\":\"scanType\",\"KeyType\":\"HASH\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}},{\"IndexName\":\"severity-index\",\"KeySchema\":[{\"AttributeName\":\"severity\",\"KeyType\":\"HASH\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]'
          --billing-mode PAY_PER_REQUEST
          --endpoint-url http://dynamodb-local:8000
          2>/dev/null || echo 'Table already exists, skipping.'
      "
    restart: "no"
